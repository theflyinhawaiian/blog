services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: blog
      MYSQL_USER: blog_user
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: db
      DB_PASSWORD_FILE: /run/secrets/db_password
      GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_client_secret
      GITHUB_CLIENT_SECRET_FILE: /run/secrets/github_client_secret
      FACEBOOK_CLIENT_SECRET_FILE: /run/secrets/facebook_client_secret
      LINKEDIN_CLIENT_SECRET_FILE: /run/secrets/linkedin_client_secret
      TWITTER_CLIENT_SECRET_FILE: /run/secrets/twitter_client_secret
      SESSION_SECRET_FILE: /run/secrets/session_secret
    ports:
      - "8080:8080"
    secrets:
      - db_password
      - google_client_secret
      - github_client_secret
      - facebook_client_secret
      - linkedin_client_secret
      - twitter_client_secret
      - session_secret
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

secrets:
  db_password:
    file: ./secrets/db_password
  db_root_password:
    file: ./secrets/db_root_password
  google_client_secret:
    file: ./secrets/google_client_secret
  github_client_secret:
    file: ./secrets/github_client_secret
  facebook_client_secret:
    file: ./secrets/facebook_client_secret
  linkedin_client_secret:
    file: ./secrets/linkedin_client_secret
  twitter_client_secret:
    file: ./secrets/twitter_client_secret
  session_secret:
    file: ./secrets/session_secret

volumes:
  db_data:
